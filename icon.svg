<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Aprueba RD">
  <!-- Fondo asfalto a sangre completa (seguro para maskable) -->
  <rect width="512" height="512" fill="#16181D"/>
  <!-- Señal en rombo ámbar, dentro de la zona segura central -->
  <g transform="translate(256 256) rotate(45)">
    <rect x="-132" y="-132" width="264" height="264" rx="40" fill="#F5B301" stroke="#2a1e00" stroke-width="18"/>
  </g>
  <!-- Marca de verificación verde (aprobado) -->
  <path d="M188 262 l44 46 l96 -104"
        fill="none" stroke="#0F7A42" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Iniciales RD -->
  <text x="256" y="360" text-anchor="middle"
        font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="70"
        fill="#2a1e00" letter-spacing="2">RD</text>
</svg>
